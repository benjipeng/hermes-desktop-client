name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Publish Apple Silicon application
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        run: |
          expected="v$(tr -d '[:space:]' < VERSION)"
          test "$GITHUB_REF_NAME" = "$expected" || {
            echo "Tag $GITHUB_REF_NAME does not match VERSION ($expected)" >&2
            exit 1
          }

      - name: Run tests
        run: make test

      - name: Resolve current Hermes release metadata
        id: upstream
        run: echo "tag=$(./scripts/latest-hermes-release.sh)" >> "$GITHUB_OUTPUT"

      - name: Build release archive
        env:
          UPSTREAM_RELEASE: ${{ steps.upstream.outputs.tag }}
        run: make package

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_RELEASE: ${{ steps.upstream.outputs.tag }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            artifacts/*.zip \
            artifacts/*.sha256 \
            artifacts/build-metadata.json \
            --title "Hermes Dashboard $GITHUB_REF_NAME" \
            --generate-notes \
            --notes "Native macOS WebKit client. Compatibility metadata references Hermes ${UPSTREAM_RELEASE}."

